<div class="w10-wrap">
    <div class="w10-title">Firmware Report &mdash; Installed Devices</div>

    <!-- Scope row -->
    <div class="w10-toolbar">
        <div class="w10-field w10-field-sm">
            <label>Owner Type</label>
            <select id="w10-ownerType" class="w10-select">
                <option value="ALL">All</option>
                <option value="TENANT">Tenant</option>
                <option value="CUSTOMER">Customer</option>
            </select>
        </div>
        <div class="w10-field" id="w10-custScopeField" style="display:none">
            <label>Customer</label>
            <select id="w10-custScope" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field" id="w10-groupScopeField" style="display:none">
            <label>Device Group</label>
            <select id="w10-groupScope" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Firmware Version</label>
            <div style="display:flex;gap:4px;">
                <input type="text" id="w10-fwInput" class="w10-input" list="w10-fwList" placeholder="fwVer..." autocomplete="off">
                <datalist id="w10-fwList"></datalist>
                <button id="w10-fwAddBtn" class="w10-btn-add" title="Add to lookup">+</button>
            </div>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Start Date</label>
            <input type="date" id="w10-startDate" class="w10-input">
        </div>
        <div class="w10-field w10-field-sm">
            <label>End Date</label>
            <input type="date" id="w10-endDate" class="w10-input">
        </div>
        <div class="w10-count" id="w10-count">--</div>
        <button id="w10-refreshBtn" class="w10-btn">Refresh</button>
        <button id="w10-exportBtn" class="w10-btn w10-btn-export" disabled>CSV</button>
    </div>

    <!-- Post-scan filter row (hidden until results exist) -->
    <div class="w10-toolbar w10-filter-row" id="w10-filterRow" style="display:none">
        <div class="w10-field w10-field-sm">
            <label>Filter Customer</label>
            <select id="w10-custFilter" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
    </div>

    <div id="w10-statusMsg" class="w10-message" style="display:none"></div>

    <!-- Main content: device list + chart -->
    <div class="w10-content-row">
        <!-- Device list panel -->
        <div class="w10-device-panel" id="w10-devicePanel">
            <div class="w10-device-search-wrap">
                <input type="text" id="w10-deviceSearch" class="w10-input" placeholder="Search devices..."
                    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            </div>
            <div class="w10-device-nav">
                <span class="w10-device-count" id="w10-deviceCount">0 devices</span>
                <div class="w10-sort-controls">
                    <select id="w10-sortSelect" class="w10-sort-sel">
                        <option value="customer">Customer</option>
                        <option value="group">Group</option>
                        <option value="name">Name</option>
                        <option value="fwVer">FW Ver</option>
                        <option value="fwDate">FW Date</option>
                    </select>
                    <button id="w10-sortDir" class="w10-nav-btn" title="Toggle sort direction">&#9650;</button>
                </div>
                <div class="w10-nav-btns">
                    <button id="w10-prevDevBtn" class="w10-nav-btn" title="Previous device">&#9650;</button>
                    <button id="w10-nextDevBtn" class="w10-nav-btn" title="Next device">&#9660;</button>
                </div>
            </div>
            <div id="w10-empty" class="w10-empty">Click Refresh to scan all devices.</div>
            <div class="w10-device-list" id="w10-deviceList"></div>
        </div>

        <!-- Chart panel -->
        <div class="w10-chart-side" id="w10-chartSide">
            <div class="w10-chart-header">
                <span class="w10-chart-title" id="w10-chartTitle">--</span>
                <button id="w10-chartClose" class="w10-chart-close" title="Close chart">&times;</button>
            </div>
            <div class="w10-chart-container">
                <canvas id="w10-chart"></canvas>
            </div>
            <div id="w10-chartPlaceholder" class="w10-placeholder">
                Select a device to view chart
            </div>
        </div>
    </div>
</div>
