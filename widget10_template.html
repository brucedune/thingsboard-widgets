<div class="w10-wrap">
    <div class="w10-title">Firmware Report &mdash; Installed Devices</div>

    <!-- Scope row -->
    <div class="w10-toolbar">
        <div class="w10-field" id="w10-custScopeField">
            <label>Customer</label>
            <select id="w10-custScope" class="w10-select">
                <option value="ALL">All (Tenant + Customers)</option>
            </select>
        </div>
        <div class="w10-field" id="w10-groupScopeField" style="display:none">
            <label>Device Group</label>
            <select id="w10-groupScope" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Start Date</label>
            <input type="date" id="w10-startDate" class="w10-input">
        </div>
        <div class="w10-field w10-field-sm">
            <label>End Date</label>
            <input type="date" id="w10-endDate" class="w10-input">
        </div>
        <div class="w10-count" id="w10-count">--</div>
        <label class="w10-toggle-label" title="Limit scan to groups that have a non-zero Engineering Review Date">
            <input type="checkbox" id="w10-engReviewOnly" checked> Eng Reviewed groups only
        </label>
        <button id="w10-refreshBtn" class="w10-btn" title="Click to refresh from cache; Shift+click to force full rescan">Refresh</button>
        <button id="w10-exportBtn" class="w10-btn w10-btn-export" disabled>CSV</button>
    </div>

    <!-- Stats row (hidden until first scan) -->
    <div class="w10-stats-row" id="w10-statsRow" style="display:none">
        <span class="w10-stat-chip" id="w10-statTotal" title="Installed devices in scan">Total: 0</span>
        <span class="w10-stat-chip w10-stat-good" id="w10-statMetering" title="deviceState = Metering (latest TS)">Metering: 0</span>
        <span class="w10-stat-chip w10-stat-warn" id="w10-statNotMetering" title="deviceState = Not Metering (latest TS)">Not Metering: 0</span>
        <span class="w10-stat-chip w10-stat-warn" id="w10-statHighGain" title="gain &gt; 40 (latest TS)">Gain &gt; 40: 0</span>
        <span class="w10-stat-chip w10-stat-warn" id="w10-statFwMismatch" title="Devices whose fwVer does NOT match the selected FW Version filter (FOTA stragglers). Hidden when FW filter = All." style="display:none;">FW Mismatch: 0</span>
        <span class="w10-stat-chip w10-stat-cache" id="w10-statCacheInfo" style="margin-left:auto;display:none;">cached</span>
    </div>

    <!-- Post-scan filter row (hidden until results exist) -->
    <div class="w10-toolbar w10-filter-row" id="w10-filterRow" style="display:none">
        <div class="w10-field w10-field-sm">
            <label>Filter Customer</label>
            <select id="w10-custFilter" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Filter Group</label>
            <select id="w10-groupFilter" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Installed</label>
            <select id="w10-installedFilter" class="w10-select">
                <option value="TRUE" selected>TRUE</option>
                <option value="FALSE">FALSE</option>
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>Model</label>
            <select id="w10-modelFilter" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field w10-field-sm">
            <label>FW Version</label>
            <select id="w10-fwFilter" class="w10-select">
                <option value="ALL">All</option>
            </select>
        </div>
        <div class="w10-field" style="flex:1;min-width:200px;">
            <label>Search</label>
            <input type="text" id="w10-deviceSearch" class="w10-input" placeholder="Name, customer, group, fwVer..."
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        </div>
    </div>

    <div id="w10-statusMsg" class="w10-message" style="display:none"></div>

    <!-- Main content: (device list + groups table) | chart -->
    <div class="w10-content-row">
      <div class="w10-left-column">
        <!-- Device list panel -->
        <div class="w10-device-panel" id="w10-devicePanel">
            <div class="w10-device-nav">
                <span class="w10-device-count" id="w10-deviceCount">0 devices</span>
                <div class="w10-nav-btns">
                    <button id="w10-prevDevBtn" class="w10-nav-btn" title="Previous device">&#9650;</button>
                    <button id="w10-nextDevBtn" class="w10-nav-btn" title="Next device">&#9660;</button>
                </div>
            </div>
            <div id="w10-empty" class="w10-empty">Click Refresh to scan all devices.</div>
            <div class="w10-device-list-wrap" id="w10-deviceListWrap">
                <table class="w10-device-table">
                    <thead>
                        <tr>
                            <th>Device ID</th>
                            <th>Property</th>
                            <th>FW</th>
                            <th>State</th>
                            <th>Active</th>
                            <th class="w10-num">Gain</th>
                        </tr>
                    </thead>
                    <tbody id="w10-deviceList"></tbody>
                </table>
            </div>
        </div>

        <!-- Groups table (groups with Engineering Review Date) -->
        <div class="w10-groups-section" id="w10-groupsSection" style="display:none;">
            <div class="w10-groups-header">
                <span class="w10-groups-title">Engineering Reviewed Groups</span>
                <span class="w10-groups-meta" id="w10-groupsMeta">--</span>
            </div>
            <div class="w10-groups-table-wrap">
                <table class="w10-groups-table">
                    <thead>
                        <tr>
                            <th>Group</th>
                            <th class="w10-num">Devices</th>
                            <th class="w10-num">FW Match</th>
                            <th class="w10-num">FW Mismatch</th>
                        </tr>
                    </thead>
                    <tbody id="w10-groupsTableBody"></tbody>
                </table>
            </div>
        </div>
      </div>

        <!-- Chart panel -->
        <div class="w10-chart-side" id="w10-chartSide">
            <div class="w10-chart-header">
                <span class="w10-chart-title" id="w10-chartTitle">--</span>
                <button id="w10-chartClose" class="w10-chart-close" title="Close chart">&times;</button>
            </div>
            <div class="w10-chart-container">
                <canvas id="w10-chart"></canvas>
            </div>
            <div id="w10-chartPlaceholder" class="w10-placeholder">
                Select a device to view chart
            </div>
        </div>
    </div>
</div>
