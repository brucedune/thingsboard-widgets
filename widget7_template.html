<div class="w7-wrap">
    <div class="w7-title">Meter Correction Dashboard</div>

    <!-- Inputs row -->
    <div class="w7-input-row">
        <div class="w7-field">
            <label>Owner Type</label>
            <select id="w7-ownerTypeSelect">
                <option value="TENANT">Tenant</option>
                <option value="CUSTOMER">Customer</option>
            </select>
        </div>

        <div class="w7-field" id="w7-customerField" style="display:none">
            <label>Customer</label>
            <select id="w7-customerSelect">
                <option value="">-- Select Customer --</option>
            </select>
        </div>

        <div class="w7-field">
            <label>Device Group</label>
            <select id="w7-groupSelect" disabled>
                <option value="">-- Select Group --</option>
            </select>
        </div>

        <div class="w7-field">
            <label>Start Date</label>
            <input type="date" id="w7-startDate" class="w7-input">
        </div>

        <div class="w7-field">
            <label>End Date</label>
            <input type="date" id="w7-endDate" class="w7-input">
        </div>

        <div class="w7-field w7-btn-field">
            <label>&nbsp;</label>
            <button id="w7-fetchBtn" class="w7-btn" disabled>Load</button>
        </div>
    </div>

    <!-- Status -->
    <div id="w7-statusMsg" class="w7-message" style="display:none"></div>

    <!-- Main content: device list + chart -->
    <div id="w7-contentPanel">
        <div class="w7-content-row">
            <!-- Device list -->
            <div class="w7-device-panel">
                <div class="w7-device-search-wrap">
                    <input type="text" id="w7-deviceSearch" class="w7-input" placeholder="Search devices..."
                        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
                </div>
                <div class="w7-device-count" id="w7-deviceCount">0 devices</div>
                <div class="w7-device-list" id="w7-deviceList"></div>
            </div>

            <!-- Right side: cards + chart + correction controls -->
            <div class="w7-chart-side">
                <!-- Summary cards -->
                <div id="w7-summaryPanel" style="display:none">
                    <div class="w7-cards-row">
                        <div class="w7-card">
                            <span class="w7-card-label">Start Value</span>
                            <span class="w7-card-value" id="w7-cardStart">--</span>
                            <span class="w7-card-sub" id="w7-cardStartDate">--</span>
                        </div>
                        <div class="w7-card">
                            <span class="w7-card-label">End Value</span>
                            <span class="w7-card-value" id="w7-cardEnd">--</span>
                            <span class="w7-card-sub" id="w7-cardEndDate">--</span>
                        </div>
                        <div class="w7-card">
                            <span class="w7-card-label">Current Diff</span>
                            <span class="w7-card-value w7-card-highlight" id="w7-cardDiff">--</span>
                        </div>
                        <div class="w7-card">
                            <span class="w7-card-label">Corrected Diff</span>
                            <span class="w7-card-value w7-card-corrected" id="w7-cardCorrDiff">--</span>
                        </div>
                        <div class="w7-card">
                            <span class="w7-card-label">Data Points</span>
                            <span class="w7-card-value" id="w7-cardPoints">--</span>
                        </div>
                    </div>
                </div>

                <!-- Chart -->
                <div id="w7-chartPanel" style="display:none">
                    <div class="w7-chart-container">
                        <canvas id="w7-chart"></canvas>
                    </div>
                </div>

                <!-- Correction controls -->
                <div id="w7-correctionPanel" style="display:none">
                    <div class="w7-anchor-hint" id="w7-anchorHint">
                        Click two points on the baseline to set correction range, or enter manually below
                    </div>
                    <div class="w7-anchor-info" id="w7-anchorInfo" style="display:none">
                        <span id="w7-anchorText"></span>
                        <button id="w7-anchorClear" class="w7-btn-small">Clear</button>
                    </div>
                    <div class="w7-correction-row">
                        <div class="w7-field" style="flex:1;min-width:180px;">
                            <label>Corrected Difference</label>
                            <input type="number" id="w7-correctionVal" class="w7-input" placeholder="Enter corrected usage value">
                        </div>
                        <div class="w7-field w7-btn-field">
                            <label>&nbsp;</label>
                            <button id="w7-previewBtn" class="w7-btn w7-btn-preview" disabled>Preview</button>
                        </div>
                        <div class="w7-field w7-btn-field">
                            <label>&nbsp;</label>
                            <button id="w7-applyBtn" class="w7-btn w7-btn-apply" disabled>Apply Correction</button>
                        </div>
                    </div>
                </div>

                <!-- Placeholder -->
                <div id="w7-placeholder" class="w7-placeholder">
                    Select a device from the list to view baseline vs corrected trace
                </div>
            </div>
        </div>
    </div>
</div>
