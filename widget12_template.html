<style>
#w12-wrap { font-family: 'Roboto','Segoe UI',sans-serif; font-size: 13px; padding: 10px; height: 100%; display: flex; flex-direction: column; }
#w12-toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
#w12-toolbar button { font-size: 12px; padding: 5px 12px; background: #305680; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
#w12-toolbar button:hover { background: #234060; }
#w12-toolbar button:disabled { background: #999; cursor: not-allowed; }
#w12-toolbar label { font-weight: 500; font-size: 12px; }
#w12-toolbar input { font-size: 12px; padding: 4px 8px; border: 1px solid #bbb; border-radius: 4px; width: 280px; }
#w12-log { font-family: 'Consolas','Courier New',monospace; font-size: 11px; background: #1e1e1e; color: #d4d4d4; padding: 10px; border-radius: 4px; flex: 1; overflow-y: auto; white-space: pre-wrap; line-height: 1.5; }
.w12-ok { color: #4ec9b0; } .w12-warn { color: #dcdcaa; } .w12-err { color: #f44747; }
.w12-info { color: #569cd6; } .w12-head { color: #c586c0; font-weight: bold; } .w12-dim { color: #808080; }
#w12-summary { display: none; background: #e8f0fe; border-radius: 4px; padding: 6px 12px; margin-bottom: 8px; font-size: 12px; }
#w12-summary b { color: #305680; }
.w12-sb { display: inline-block; margin: 2px 8px 2px 0; }
</style>

<div id="w12-wrap">
  <div id="w12-toolbar">
    <button id="w12-runAll">Run Full Benchmark</button>
    <button id="w12-runParallel" style="background:#7b1fa2;">Test 10 Parallel</button>
    <button id="w12-clear" style="background:#888;">Clear</button>
    <label style="margin-left:12px;">Group ID:</label>
    <input id="w12-groupId" placeholder="Optional: paste device group UUID">
    <label>Max dev:</label>
    <input id="w12-maxDev" type="number" value="10" style="width:50px;" min="1" max="200">
  </div>
  <div id="w12-summary"></div>
  <div id="w12-log">Click "Run Full Benchmark" to test API response times.</div>
</div>
