<div class="w5-wrap">

                                <span class="w5-card-label">Start Reading</span>
                                <span class="w5-card-value" id="w5-cardStart">—</span>
                                <span class="w5-card-sub" id="w5-cardStartDate">—</span>
                            </div>
                            <div class="w5-card">
                                <span class="w5-card-label">End Reading</span>
                                <span class="w5-card-value" id="w5-cardEnd">—</span>
                                <span class="w5-card-sub" id="w5-cardEndDate">—</span>

                            </div>
                        </div>
                    </div>
                    <div id="w5-chartPanel" style="display:none">
                        <div class="w5-chart-container">
                            <canvas id="w5-chart"></canvas>
                        </div>
                    </div>
                    <div id="w5-placeholder" class="w5-placeholder">

                <div class="w5-chart-half">

                        </div>
                        <div class="w5-chart-container w5-detail-chart">
                            <canvas id="w5-detailChart"></canvas>
                        </div>
                    </div>
                    <div id="w5-detailPlaceholder" class="w5-placeholder">
