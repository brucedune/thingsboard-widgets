<div class="w9-wrap">
    <div class="w9-title">CSV Import -- Create Customer, Group &amp; Devices</div>

    <!-- Step 1: Customer & Group -->
    <div class="w9-input-row">
        <div class="w9-field">
            <label>Customer Name</label>
            <input type="text" id="w9-customerName" class="w9-input" placeholder="Enter new customer name">
        </div>
        <div class="w9-field">
            <label>Device Group Name</label>
            <input type="text" id="w9-groupName" class="w9-input" placeholder="Enter device group name">
        </div>
        <div class="w9-field w9-btn-field">
            <label>CSV File</label>
            <input type="file" id="w9-csvFile" accept=".csv,.tsv,.txt" class="w9-file-input">
        </div>
        <div class="w9-field w9-btn-field">
            <label>&nbsp;</label>
            <button id="w9-importBtn" class="w9-btn w9-btn-import" disabled>Import</button>
        </div>
    </div>

    <!-- Column mapping -->
    <div id="w9-mappingPanel" class="w9-mapping-panel" style="display:none">
        <div class="w9-mapping-title">Column Mapping</div>
        <div class="w9-mapping-hint">Assign each CSV column to a device field. "Device Name" is required. Use "Attribute:" prefix columns to set server attributes.</div>
        <div id="w9-mappingRow" class="w9-mapping-row"></div>
    </div>

    <!-- Preview table -->
    <div id="w9-previewPanel" class="w9-preview-panel" style="display:none">
        <div class="w9-preview-header">
            <span id="w9-previewCount">0 rows</span>
        </div>
        <div class="w9-table-wrap">
            <table id="w9-previewTable" class="w9-table">
                <thead id="w9-previewHead"></thead>
                <tbody id="w9-previewBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Status -->
    <div id="w9-statusMsg" class="w9-message" style="display:none"></div>

    <!-- Progress -->
    <div id="w9-progressPanel" style="display:none">
        <div class="w9-progress-bar">
            <div id="w9-progressFill" class="w9-progress-fill" style="width:0%"></div>
        </div>
        <div id="w9-progressText" class="w9-progress-text">Starting...</div>
    </div>

    <!-- Results log -->
    <div id="w9-logPanel" class="w9-log-panel" style="display:none">
        <div class="w9-log-title">Import Log</div>
        <div id="w9-log" class="w9-log"></div>
    </div>
</div>
