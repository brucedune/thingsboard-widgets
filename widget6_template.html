<div class="w6-wrap">
    <div class="w6-title">Site Usage Dashboard</div>

    <!-- Inputs row -->
    <div class="w6-input-row">
        <div class="w6-field">
            <label>Owner Type</label>
            <select id="w6-ownerTypeSelect">
                <option value="TENANT">Tenant</option>
                <option value="CUSTOMER">Customer</option>
            </select>
        </div>

        <div class="w6-field" id="w6-customerField" style="display:none">
            <label>Customer</label>
            <select id="w6-customerSelect">
                <option value="">— Select Customer —</option>
            </select>
        </div>

        <div class="w6-field">
            <label>Device Group</label>
            <select id="w6-groupSelect" disabled>
                <option value="">— Select Group —</option>
            </select>
        </div>

        <div class="w6-field">
            <label>Start Date</label>
            <input type="date" id="w6-startDate" class="w6-input">
        </div>

        <div class="w6-field">
            <label>End Date</label>
            <input type="date" id="w6-endDate" class="w6-input">
        </div>

        <div class="w6-field w6-btn-field">
            <label>&nbsp;</label>
            <button id="w6-fetchBtn" class="w6-btn" disabled>Load</button>
        </div>
    </div>

    <!-- Status -->
    <div id="w6-statusMsg" class="w6-message" style="display:none"></div>

    <!-- Summary cards -->
    <div id="w6-summaryPanel" style="display:none">
        <div class="w6-cards-row">
            <div class="w6-card">
                <span class="w6-card-label">Total Devices</span>
                <span class="w6-card-value" id="w6-cardDevices">—</span>
            </div>
            <div class="w6-card">
                <span class="w6-card-label">Devices With Data</span>
                <span class="w6-card-value" id="w6-cardWithData">—</span>
            </div>
            <div class="w6-card">
                <span class="w6-card-label">Total Site Usage</span>
                <span class="w6-card-value w6-card-highlight" id="w6-cardTotal">—</span>
            </div>
            <div class="w6-card">
                <span class="w6-card-label">Avg Per Device</span>
                <span class="w6-card-value" id="w6-cardAvgDevice">—</span>
            </div>
            <div class="w6-card">
                <span class="w6-card-label">Avg Monthly Usage</span>
                <span class="w6-card-value" id="w6-cardAvgMonth">—</span>
            </div>
        </div>
    </div>

    <!-- Monthly bar chart -->
    <div id="w6-chartPanel" style="display:none">
        <div class="w6-chart-container">
            <canvas id="w6-chart"></canvas>
        </div>
    </div>

    <!-- Monthly table -->
    <div id="w6-tablePanel" style="display:none">
        <div class="w6-table-header">
            <div class="w6-table-title" id="w6-tableTitle">Monthly Breakdown</div>
            <button id="w6-exportBtn" class="w6-export-btn">Export CSV</button>
        </div>
        <div class="w6-table-wrap">
            <table class="w6-table">
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Site Usage</th>
                        <th>Devices Reporting</th>
                        <th>Avg Per Device</th>
                        <th>vs Prior Month</th>
                        <th>Trend</th>
                    </tr>
                </thead>
                <tbody id="w6-tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Per-device table -->
    <div id="w6-devicePanel" style="display:none">
        <div class="w6-table-header">
            <div class="w6-table-title">Per-Device Usage</div>
            <button id="w6-exportDevBtn" class="w6-export-btn">Export CSV</button>
        </div>
        <div class="w6-table-wrap">
            <table class="w6-table">
                <thead>
                    <tr>
                        <th>Device Name</th>
                        <th>Property</th>
                        <th>Apartment</th>
                        <th>Start Value</th>
                        <th>End Value</th>
                        <th>Total Usage</th>
                        <th>% of Site</th>
                    </tr>
                </thead>
                <tbody id="w6-deviceBody"></tbody>
            </table>
        </div>
    </div>
</div>
