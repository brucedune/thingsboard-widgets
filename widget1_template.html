<div id="w1-root" class="w1-wrap">

    <!-- Owner Type -->
    <div class="w1-row">
        <label class="w1-label">Owner</label>
        <select id="w1-ownerTypeSelect" class="w1-select">
            <option value="TENANT">Tenant</option>
            <option value="CUSTOMER">Customer</option>
        </select>
    </div>

    <!-- Customer (shown only when Customer selected) -->
    <div id="w1-customerField" class="w1-row" style="display:none;">
        <label class="w1-label">Customer</label>
        <select id="w1-customerSelect" class="w1-select">
            <option value="">— Select Customer —</option>
        </select>
    </div>

    <!-- Source Group -->
    <div class="w1-row">
        <label class="w1-label">Device Group</label>
        <select id="w1-groupSelect" class="w1-select" disabled>
            <option value="">— Select Group —</option>
        </select>
    </div>

    <!-- Device Section -->
    <div id="w1-deviceSection" style="display:none;">

        <div class="w1-device-header">
            <span id="w1-deviceCount" class="w1-device-count"></span>
            <span class="w1-sel-links">
                <a href="#" id="w1-selectAll">All</a> &nbsp;/&nbsp;
                <a href="#" id="w1-selectNone">None</a>
            </span>
        </div>

        <!-- Search injected here by JS -->
        <div id="w1-deviceList" class="w1-device-list"></div>
        <div id="w1-emptyMsg" class="w1-empty" style="display:none;">No devices found in this group.</div>

        <!-- Attribute Filter -->
        <div id="w1-attrFilterSection" class="w1-filter-row" style="display:none;">
            <select id="w1-filterAttrKey" class="w1-filter-input">
                <option value="">— Filter by attribute —</option>
                <option value="Installed">Installed</option>
                <option value="Replace">Replace</option>
            </select>
            <select id="w1-filterAttrValue" class="w1-filter-input" style="max-width:90px;">
                <option value="true">TRUE</option>
                <option value="false">FALSE</option>
            </select>
            <button id="w1-filterApplyBtn" class="w1-filter-btn">Apply</button>
            <button id="w1-filterClearBtn" class="w1-filter-clear">Clear</button>
        </div>

        <!-- Action -->
        <div class="w1-action-row">
            <label class="w1-radio-label">
                <input type="radio" name="w1-actionType" id="w1-actionRemove" value="remove" checked>
                Remove from group
            </label>
            <label class="w1-radio-label">
                <input type="radio" name="w1-actionType" id="w1-actionMove" value="move">
                Move to group
            </label>
        </div>

        <!-- Target (Move only) -->
        <div id="w1-moveTargetField" style="display:none;">

            <!-- Target Owner Type -->
            <div class="w1-row">
                <label class="w1-label">Target Owner</label>
                <select id="w1-targetOwnerTypeSelect" class="w1-select">
                    <option value="TENANT">Tenant</option>
                    <option value="CUSTOMER">Customer</option>
                </select>
            </div>

            <!-- Target Customer (shown only when Customer selected) -->
            <div id="w1-targetCustomerField" class="w1-row" style="display:none;">
                <label class="w1-label">Target Customer</label>
                <select id="w1-targetCustomerSelect" class="w1-select">
                    <option value="">— Select Customer —</option>
                </select>
            </div>

            <!-- Target Group -->
            <div class="w1-row">
                <label class="w1-label">Target Group</label>
                <select id="w1-targetGroupSelect" class="w1-select">
                    <option value="">— Select Target Group —</option>
                </select>
            </div>

        </div>

        <button id="w1-actionBtn" class="w1-btn" disabled>Remove Selected from Group</button>

    </div>

    <!-- Status -->
    <div id="w1-statusMsg" class="w1-message" style="display:none;"></div>

</div>

<style>

        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
    }

        min-width: 100px;
        font-weight: 500;
        color: #555;
    }
    .w1-select {
        flex: 1;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        background: #fff;
    }
    .w1-select:disabled {
        background: #f5f5f5;
        color: #aaa;
    }

        display: flex;
        align-items: center;
        justify-content: space-between;

    }
    .w1-device-count {
        font-weight: 600;
        font-size: 13px;
        color: #444;
    }

        color: #1565c0;
        text-decoration: none;
        cursor: pointer;
    }
    .w1-sel-links a:hover { text-decoration: underline; }
    .w1-search {
        width: 100%;

        margin-bottom: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        outline: none;
    }
    .w1-search:focus { border-color: #1565c0; }
    .w1-device-list {
        max-height: 280px;

    }
    .msg-success {
        background: #e8f5e9;

    }
