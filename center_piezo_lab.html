<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Center Piezo Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/uplot@latest/dist/uPlot.min.css">
  <script src="https://unpkg.com/uplot@latest/dist/uPlot.iife.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0; padding: 12px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      line-height: 1.35;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      height: 100vh;
      box-sizing: border-box;
    }
    header { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .status { padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    .status.connected { background: #0a7a2a; color: white; }
    .status.disconnected { background: #7a0a0a; color: white; }
    .panel {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: end;
      padding: 8px; border: 1px solid #8884; border-radius: 6px;
    }
    .group { display: flex; flex-direction: column; gap: 2px; }
    .group label { font-size: 11px; opacity: 0.75; }
    .group input, .group select {
      padding: 4px 6px; font-size: 13px; width: 88px;
      background: transparent; color: inherit;
      border: 1px solid #8886; border-radius: 3px;
    }
    button {
      padding: 5px 14px; font-size: 13px; cursor: pointer;
      border: 1px solid #8886; border-radius: 3px;
      background: #8882; color: inherit;
    }
    button:hover { background: #8884; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.primary { background: #0a7a2a; color: white; border-color: #0a7a2a; }
    button.primary:hover { background: #0c9235; }
    button.danger { background: #a82020; color: white; border-color: #a82020; }
    #chart { width: 100%; height: 100%; min-height: 260px; }
    .log-wrap { display: flex; flex-direction: column; min-height: 0; }
    .log-toolbar {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; opacity: 0.75; padding: 2px 4px;
    }
    .log-toolbar span { margin-right: auto; }
    button.small { padding: 2px 8px; font-size: 11px; }
    #log {
      font-family: ui-monospace, Consolas, monospace; font-size: 11px;
      height: 120px; overflow-y: auto; padding: 6px; border: 1px solid #8884;
      border-radius: 4px; white-space: pre-wrap; background: #0001;
    }
    .kv { font-size: 12px; opacity: 0.75; margin-left: auto; }
  </style>
</head>
<body>
  <header>
    <h1>Center Piezo Lab</h1>
    <button id="connect" class="primary">Connect</button>
    <button id="disconnect" disabled>Disconnect</button>
    <span id="status" class="status disconnected">disconnected</span>
    <span class="kv">921600 8N1 — STLink VCP</span>
  </header>

  <div class="panel">
    <div class="group">
      <label>Piezo</label>
      <select id="mode">
        <option value="1">1 — 45° Piezo</option>
        <option value="2">2 — 40° Piezo</option>
        <option value="3" selected>3 — Center Piezo</option>
      </select>
    </div>
    <div class="group"><label>Duration (µs)</label><input id="dur" type="number" value="10" min="1"></div>
    <div class="group"><label>Gain</label><input id="gain" type="number" value="40" min="17" max="63"></div>
    <div class="group"><label>Pulses</label><input id="pulses" type="number" value="13" min="1"></div>
    <div class="group"><label>Blanking (µs)</label><input id="blank" type="number" value="33" min="0"></div>
    <div class="group"><label>Env Threshold</label><input id="env" type="number" value="33"></div>
    <button id="apply">Apply</button>
    <button id="show">Show</button>

    <div class="group">
      <label>Shot mode</label>
      <select id="shot">
        <option value="single" selected>Single</option>
        <option value="continuous">Continuous</option>
      </select>
    </div>
    <div class="group"><label>Period (ms)</label><input id="period" type="number" value="500" min="50"></div>
    <div class="group">
      <label>Direction</label>
      <select id="dir">
        <option value="both" selected>UPS + DNS</option>
        <option value="ups">UPS only</option>
        <option value="dns">DNS only</option>
      </select>
    </div>
    <button id="fire" class="primary">Fire</button>
    <button id="stop" class="danger" disabled>Stop</button>
    <button id="save">Save CSV</button>
    <span id="tofReadout" class="kv"></span>
  </div>

  <div class="panel">
    <div class="group">
      <label>TI Firmware (binary)</label>
      <input type="file" id="fwfile" accept=".bin,.txt,.out">
    </div>
    <button id="fwup">Upload to TI</button>
    <progress id="fwprogress" max="100" value="0" style="width:140px; display:none"></progress>
    <span id="fwstatus" class="kv"></span>
  </div>

  <div id="chart"></div>
  <div class="log-wrap">
    <div class="log-toolbar">
      <span>Log</span>
      <button id="copyLog" class="small">Copy</button>
      <button id="clearLog" class="small">Clear</button>
    </div>
    <div id="log"></div>
  </div>

<script>
"use strict";

/* -------- serial ------------------------------------------------------ */
let port = null, reader = null, writer = null, readLoop = null;

const el = id => document.getElementById(id);
const logEl = el("log");
const statusEl = el("status");

function log(line, cls) {
  const t = new Date().toISOString().slice(11, 23);
  logEl.textContent += `[${t}] ${line}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setConnected(on) {
  statusEl.textContent = on ? "connected" : "disconnected";
  statusEl.className = "status " + (on ? "connected" : "disconnected");
  el("connect").disabled = on;
  el("disconnect").disabled = !on;
  for (const b of ["apply", "show", "fire", "fwup"]) el(b).disabled = !on;
}

async function connect() {
  if (!("serial" in navigator)) {
    log("Web Serial not supported — use Chrome/Edge");
    return;
  }
  try {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 921600, dataBits: 8, stopBits: 1, parity: "none", flowControl: "none" });
    writer = port.writable.getWriter();
    setConnected(true);
    log("connected");
    readLoop = runReadLoop();
    /* Wake the firmware's "lab shell alive" LED and pull current settings. */
    await send("cp show");
  } catch (e) {
    log("connect error: " + e.message);
  }
}

async function disconnect() {
  stopContinuous();
  try { if (reader) await reader.cancel(); } catch {}
  try { if (writer) { writer.releaseLock(); writer = null; } } catch {}
  try { if (port) await port.close(); } catch {}
  port = null;
  setConnected(false);
  log("disconnected");
}

async function send(line) {
  if (!writer) { log("not connected"); return; }
  const data = new TextEncoder().encode(line + "\n");
  await writer.write(data);
  log("> " + line);
}

/* -------- line reader & capture parser -------------------------------- */
let rxBuf = "";
let curCap = null;        /* { meta, samples } for direction currently streaming */
let lastUps = null, lastDns = null; /* most recent of each */

async function runReadLoop() {
  const decoder = new TextDecoderStream();
  const readable = port.readable.pipeThrough(decoder);
  reader = readable.getReader();
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      rxBuf += value;
      let idx;
      while ((idx = rxBuf.indexOf("\n")) >= 0) {
        const line = rxBuf.slice(0, idx).replace(/\r$/, "");
        rxBuf = rxBuf.slice(idx + 1);
        handleLine(line);
      }
    }
  } catch (e) { log("read error: " + e.message); }
  reader.releaseLock(); reader = null;
}

function handleLine(line) {
  if (line.startsWith("CAP BEGIN")) {
    curCap = { meta: parseKv(line.slice(9)), samples: [] };
    log("< " + line);
    return;
  }
  if (line.startsWith("CAP END")) {
    if (curCap) {
      const dir = (curCap.meta.dir || "UPS").toUpperCase();
      if (dir === "DNS") lastDns = curCap; else lastUps = curCap;
      curCap = null;
      renderCapture();
    }
    log("< " + line);
    return;
  }
  if (line.startsWith("CAP,") && curCap) {
    const parts = line.split(",");
    if (parts.length === 3) {
      const v = parseInt(parts[2], 10);
      if (!Number.isNaN(v)) curCap.samples.push(v);
    }
    return;
  }
  if (line.length) log("< " + line);
}

function parseKv(s) {
  const out = {};
  for (const tok of s.trim().split(/\s+/)) {
    const eq = tok.indexOf("=");
    if (eq > 0) out[tok.slice(0, eq)] = tok.slice(eq + 1);
  }
  return out;
}

/* -------- uPlot chart -------------------------------------------------- */
let plot = null;
let plotLen = 0;

function ensurePlot(n) {
  const host = el("chart");
  const opts = {
    width: host.clientWidth,
    height: host.clientHeight || 300,
    scales: { x: { time: false } },
    axes: [ { label: "sample idx" }, { label: "ADC value" } ],
    series: [
      {},
      { label: "UPS", stroke: "#1e88e5", width: 1 },
      { label: "DNS", stroke: "#43a047", width: 1 },
      { label: "env threshold", stroke: "#e53935", width: 1, dash: [4,4] },
    ],
  };
  if (plot) { plot.destroy(); plot = null; }
  const zero = new Array(n).fill(0);
  plot = new uPlot(opts, [Array.from({length:n}, (_,i)=>i), zero.slice(), zero.slice(), zero.slice()], host);
  plotLen = n;
}

function pad(arr, n) {
  if (arr.length === n) return arr;
  if (arr.length > n) return arr.slice(0, n);
  const out = arr.slice();
  while (out.length < n) out.push(null);
  return out;
}

function renderCapture() {
  const ups = lastUps ? lastUps.samples : [];
  const dns = lastDns ? lastDns.samples : [];
  const n = Math.max(ups.length, dns.length, 1);
  const meta = (lastDns || lastUps || {meta:{}}).meta;
  const env = parseInt(meta.env || "0", 10);

  if (!plot || plotLen !== n) ensurePlot(n);
  const x = Array.from({length: n}, (_, i) => i);
  const envArr = new Array(n).fill(env);
  plot.setData([x, pad(ups, n), pad(dns, n), envArr]);

  const dtof = meta.dtof || "-";
  const tu = meta.tof_ups || "-";
  const td = meta.tof_dns || "-";
  const vol = meta.vol || "-";
  const mode = meta.mode || "?";
  el("tofReadout").textContent =
    `mode=${mode} dtof=${dtof}ps tof_ups=${tu}ns tof_dns=${td}ns vol=${vol}`;
  const upsPeak = ups.length ? Math.max(...ups) : "-";
  const dnsPeak = dns.length ? Math.max(...dns) : "-";
  log(`render shot=${meta.shot} ups_n=${ups.length} dns_n=${dns.length} upsPeak=${upsPeak} dnsPeak=${dnsPeak}`);
}

/* -------- continuous fire --------------------------------------------- */
let contTimer = null;

function startContinuous() {
  const period = Math.max(50, parseInt(el("period").value, 10) || 500);
  el("stop").disabled = false;
  el("fire").disabled = true;
  contTimer = setInterval(() => send("cp fire"), period);
  send("cp fire"); /* fire immediately too */
  log(`continuous: period=${period}ms`);
}

function stopContinuous() {
  if (contTimer) { clearInterval(contTimer); contTimer = null; }
  el("stop").disabled = true;
  el("fire").disabled = !port;
}

/* -------- apply form -> firmware -------------------------------------- */
async function apply() {
  const mode = el("mode").value;
  await send(`cp mode ${mode}`);
  const pairs = [
    ["dur", el("dur").value],
    ["gain", el("gain").value],
    ["pulses", el("pulses").value],
    ["blank", el("blank").value],
    ["env", el("env").value],
  ];
  for (const [k, v] of pairs) {
    await send(`cp ${k} ${v}`);
    await new Promise(r => setTimeout(r, 10));
  }
  await send(`cp dir ${el("dir").value}`);
  /* Single push to TI once all params are set — avoids 2 s blocking
   * retry loops per parameter and the nested-command buffer corruption
   * that came with them. */
  await send("cp apply");
  await send("cp show");
}

/* -------- TI-TXT decode + pack into ti_fota's chunk-header format ----- */
/* ti_fota expects:
 *   [uint32 CRC32(LE) of everything after]
 *   repeating:
 *     [packed struct { uint32 addr(LE); uint16 len(LE); }]
 *     [len bytes of data]
 * CRC32 is standard poly 0xEDB88320 but with the table pre-XORed by
 * 0xFF000000 and init=0 / no-final-XOR — mirrors fota.c crc32_for_byte. */

let cp_crc_table = null;
function duneCrc32(data) {
  if (!cp_crc_table) {
    cp_crc_table = new Uint32Array(256);
    for (let i = 0; i < 256; i++) {
      let r = i;
      for (let j = 0; j < 8; j++) r = ((r & 1) ? 0 : 0xEDB88320) ^ (r >>> 1);
      cp_crc_table[i] = (r ^ 0xFF000000) >>> 0;
    }
  }
  let crc = 0;
  for (let i = 0; i < data.length; i++) {
    crc = (cp_crc_table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8)) >>> 0;
  }
  return crc >>> 0;
}

function parseTiTxt(text) {
  const chunks = [];
  let cur = null;
  let lineNo = 0;
  for (const raw of text.split(/\r?\n/)) {
    lineNo++;
    const line = raw.trim();
    if (!line) continue;
    if (line === "q" || line === "Q") break;
    if (line.startsWith("@")) {
      if (cur) chunks.push(cur);
      const addr = parseInt(line.slice(1), 16);
      if (!Number.isFinite(addr)) throw new Error(`line ${lineNo}: bad @ address '${line}'`);
      cur = { addr, data: [] };
    } else {
      if (!cur) throw new Error(`line ${lineNo}: data before @ section`);
      for (const tok of line.split(/\s+/)) {
        if (!tok) continue;
        const b = parseInt(tok, 16);
        if (!Number.isFinite(b) || b < 0 || b > 0xFF) {
          throw new Error(`line ${lineNo}: bad hex byte '${tok}'`);
        }
        cur.data.push(b);
      }
    }
  }
  if (cur) chunks.push(cur);
  if (chunks.length === 0) throw new Error("no @ sections found — not TI-TXT?");
  return chunks;
}

function encodeChunksForTiFota(chunks) {
  let total = 4;
  for (const c of chunks) {
    if (c.data.length > 0xFFFF) {
      throw new Error(`chunk @0x${c.addr.toString(16)} too large (${c.data.length} > 65535)`);
    }
    total += 6 + c.data.length;
  }
  const out = new Uint8Array(total);
  const view = new DataView(out.buffer);
  let off = 4;
  for (const c of chunks) {
    view.setUint32(off, c.addr >>> 0, true);
    view.setUint16(off + 4, c.data.length, true);
    off += 6;
    out.set(c.data, off);
    off += c.data.length;
  }
  view.setUint32(0, duneCrc32(out.subarray(4)), true);
  return out;
}

function looksLikeTiTxt(buf) {
  /* First 1 KB: if all bytes are printable ASCII and '@' shows up, TI-TXT. */
  const n = Math.min(buf.length, 1024);
  let seenAt = false;
  for (let i = 0; i < n; i++) {
    const b = buf[i];
    if (b === 0x40) seenAt = true;
    if (b < 0x09 || (b > 0x0D && b < 0x20) || b > 0x7E) return false;
  }
  return seenAt;
}

/* -------- upload TI firmware over UART (existing `fwup <size>` command) */
async function uploadTiFirmware() {
  const file = el("fwfile").files[0];
  if (!file) { log("fwup: pick a firmware file first"); return; }
  if (!writer) { log("fwup: connect first"); return; }

  const raw = new Uint8Array(await file.arrayBuffer());
  let data;
  if (looksLikeTiTxt(raw)) {
    try {
      const text = new TextDecoder().decode(raw);
      const chunks = parseTiTxt(text);
      data = encodeChunksForTiFota(chunks);
      const payloadBytes = data.length - 4 - 6 * chunks.length;
      log(`fwup: parsed TI-TXT — ${chunks.length} section(s), ${payloadBytes} code bytes, ${data.length} packed`);
    } catch (e) {
      log("fwup: TI-TXT parse error: " + e.message);
      return;
    }
  } else {
    data = raw;
    log(`fwup: treating as pre-encoded binary (${data.length} bytes)`);
  }

  const size = data.length;
  if (size === 0 || size > 131072) {
    log(`fwup: size ${size} out of range (max 128 KB = tmpBuf)`); return;
  }
  const progress = el("fwprogress");
  const statusSpan = el("fwstatus");
  progress.style.display = "";
  progress.value = 0;
  statusSpan.textContent = `sending ${size} bytes...`;

  const wasDisabled = new Set();
  for (const id of ["fwup", "fire", "apply", "disconnect"]) {
    if (!el(id).disabled) wasDisabled.add(id);
    el(id).disabled = true;
  }

  try {
    log(`fwup: ${file.name} (${size} bytes)`);
    await send(`fwup ${size}`);
    /* firmware prints "ready to accept N bytes" then enters uart_read */
    await new Promise(r => setTimeout(r, 250));

    const chunk = 512;
    for (let off = 0; off < size; off += chunk) {
      const slice = data.subarray(off, Math.min(off + chunk, size));
      await writer.write(slice);
      progress.value = Math.floor(((off + slice.length) * 100) / size);
      statusSpan.textContent = `${off + slice.length} / ${size}`;
      /* Let browser flush its USB buffer. No HW flow control in 8N1, but
       * Web Serial internal queue + MCU uart_read keep pace at 921600. */
      if ((off & 0x1FFF) === 0) await new Promise(r => setTimeout(r, 0));
    }

    progress.value = 100;
    statusSpan.textContent = "sent — awaiting CRC + BSL flash...";
    log("fwup: all bytes sent");
  } catch (e) {
    log("fwup error: " + e.message);
    statusSpan.textContent = "error";
  } finally {
    for (const id of wasDisabled) el(id).disabled = false;
  }
}

/* -------- save last capture(s) as CSV --------------------------------- */
function saveCsv() {
  if (!lastUps && !lastDns) { log("no capture to save"); return; }
  const m = (lastDns || lastUps).meta;
  const lines = [
    `# shot=${m.shot||""} mode=${m.mode||""} dur=${m.dur||""} gain=${m.gain||""} pulses=${m.pulses||""} blank=${m.blank||""} env=${m.env||""}`,
    `# dtof=${m.dtof||""} tof_ups=${m.tof_ups||""} tof_dns=${m.tof_dns||""} vol=${m.vol||""}`,
    "idx,ups,dns",
  ];
  const ups = lastUps ? lastUps.samples : [];
  const dns = lastDns ? lastDns.samples : [];
  const n = Math.max(ups.length, dns.length);
  for (let i = 0; i < n; i++) {
    lines.push(`${i},${ups[i] ?? ""},${dns[i] ?? ""}`);
  }
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `cp_shot${m.shot||Date.now()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

/* -------- wire up buttons --------------------------------------------- */
el("connect").onclick = connect;
el("disconnect").onclick = disconnect;
el("apply").onclick = apply;
el("show").onclick = () => send("cp show");
el("fire").onclick = () => {
  if (el("shot").value === "continuous") startContinuous();
  else send("cp fire");
};
el("stop").onclick = stopContinuous;
el("save").onclick = saveCsv;
el("fwup").onclick = uploadTiFirmware;

el("clearLog").onclick = () => { logEl.textContent = ""; };
el("copyLog").onclick = async () => {
  const text = logEl.textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = el("copyLog");
    const orig = btn.textContent;
    btn.textContent = "Copied";
    setTimeout(() => { btn.textContent = orig; }, 900);
  } catch (e) {
    /* Fallback: select the log so the user can Ctrl+C */
    const r = document.createRange();
    r.selectNodeContents(logEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(r);
    log("clipboard blocked — log selected, press Ctrl+C");
  }
};

el("shot").onchange = () => {
  const isCont = el("shot").value === "continuous";
  el("period").disabled = !isCont;
  el("fire").textContent = isCont ? "Start" : "Fire";
};
el("shot").onchange();

window.addEventListener("resize", () => { if (plot) plot.setSize({ width: el("chart").clientWidth, height: el("chart").clientHeight }); });
window.addEventListener("beforeunload", disconnect);

setConnected(false);
log("ready. click Connect, pick the STLink VCP.");
</script>
</body>
</html>
