<div class="w3-wrap">
    <div class="w3-title">Meter Reading Difference</div>

    <!-- All inputs on one row -->
    <div class="w3-input-row">
        <div class="w3-field">
            <label>Owner Type</label>
            <select id="w3-ownerTypeSelect">
                <option value="TENANT">Tenant</option>
                <option value="CUSTOMER">Customer</option>
            </select>
        </div>

        <div class="w3-field" id="w3-customerField" style="display:none">
            <label>Customer</label>
            <select id="w3-customerSelect">
                <option value="">— Select Customer —</option>
            </select>
        </div>

        <div class="w3-field">
            <label>Device Group</label>
            <select id="w3-groupSelect" disabled>
                <option value="">— Select Group —</option>
            </select>
        </div>

        <div class="w3-field">
            <label>Start Date</label>
            <input type="date" id="w3-startDate" class="w3-input">
        </div>

        <div class="w3-field">
            <label>End Date</label>
            <input type="date" id="w3-endDate" class="w3-input">
        </div>

        <div class="w3-field w3-btn-field">
            <label>&nbsp;</label>
            <button id="w3-calcBtn" class="w3-btn" disabled>Calculate</button>
        </div>
    </div>

    <!-- Status -->
    <div id="w3-statusMsg" class="w3-message" style="display:none"></div>

    <!-- Results -->
    <div id="w3-results" style="display:none">
        <div class="w3-results-header">
            <div class="w3-summary" id="w3-summary"></div>
            <button id="w3-exportBtn" class="w3-export-btn">Export CSV</button>
        </div>
        <div class="w3-table-wrap">
            <table class="w3-table">
                <thead>
                    <tr>
                        <th data-sort="name">Device Name<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="property">Property<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="apartment">Apartment<span class="w3-sort-arrow"> ▲</span></th>
                        <th data-sort="deviceState">Device State<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="replace">Replace<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="billable">Billable<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="leak">Leak<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="billingReview">Billing Review<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="startTime">Start Read Date<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="startVal">Start Read Value<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="endTime">End Read Date<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="endVal">End Read Value<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="diff">Difference<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="prevDiff">Prev Period Diff<span class="w3-sort-arrow"> ⇅</span></th>
                        <th data-sort="change">% Change<span class="w3-sort-arrow"> ⇅</span></th>
                        <th>Trend</th>
                    </tr>
                </thead>
                <tbody id="w3-tableBody"></tbody>
            </table>
        </div>
    </div>
</div>
