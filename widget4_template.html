<div class="w4-wrap">
    <div class="w4-title">Meter Value Correction</div>

    <!-- Row 1: Select device -->
    <div class="w4-input-row">
        <div class="w4-field">
            <label>Owner Type</label>
            <select id="w4-ownerTypeSelect">
                <option value="TENANT">Tenant</option>
                <option value="CUSTOMER">Customer</option>
            </select>
        </div>

        <div class="w4-field" id="w4-customerField" style="display:none">
            <label>Customer</label>
            <select id="w4-customerSelect">
                <option value="">— Select Customer —</option>
            </select>
        </div>

        <div class="w4-field">
            <label>Device Group</label>
            <select id="w4-groupSelect" disabled>
                <option value="">— Select Group —</option>
            </select>
        </div>

        <div class="w4-field">
            <label>Device</label>
            <select id="w4-deviceSelect" disabled>
                <option value="">— Select Device —</option>
            </select>
        </div>

        <div class="w4-field">
            <label>Start Date</label>
            <input type="date" id="w4-startDate" class="w4-input">
        </div>

        <div class="w4-field">
            <label>End Date</label>
            <input type="date" id="w4-endDate" class="w4-input">
        </div>

        <div class="w4-field w4-btn-field">
            <label>&nbsp;</label>
            <button id="w4-fetchBtn" class="w4-btn" disabled>Fetch</button>
        </div>
    </div>

    <!-- Status -->
    <div id="w4-statusMsg" class="w4-message" style="display:none"></div>

    <!-- Current readings summary -->
    <div id="w4-readingsPanel" style="display:none">
        <div class="w4-readings-row">
            <div class="w4-reading-box">
                <span class="w4-reading-label">Start Value</span>
                <span class="w4-reading-value" id="w4-startVal">—</span>
                <span class="w4-reading-date" id="w4-startDate2">—</span>
            </div>
            <div class="w4-reading-box">
                <span class="w4-reading-label">End Value</span>
                <span class="w4-reading-value" id="w4-endVal">—</span>
                <span class="w4-reading-date" id="w4-endDate2">—</span>
            </div>
            <div class="w4-reading-box">
                <span class="w4-reading-label">Current Difference</span>
                <span class="w4-reading-value" id="w4-currentDiff">—</span>
            </div>
            <div class="w4-reading-box">
                <span class="w4-reading-label">Data Points</span>
                <span class="w4-reading-value" id="w4-pointCount">—</span>
            </div>
        </div>

        <!-- Correction input -->
        <div class="w4-correction-row">
            <div class="w4-field">
                <label>Corrected Difference</label>
                <input type="number" id="w4-correctionVal" class="w4-input" placeholder="Enter corrected usage value">
            </div>
            <div class="w4-field w4-btn-field">
                <label>&nbsp;</label>
                <button id="w4-previewBtn" class="w4-btn w4-btn-preview" disabled>Preview</button>
            </div>
        </div>
    </div>

    <!-- Preview table -->
    <div id="w4-previewPanel" style="display:none">
        <div class="w4-preview-header">
            <div class="w4-preview-summary" id="w4-previewSummary"></div>
            <button id="w4-applyBtn" class="w4-btn w4-btn-apply">Apply Correction</button>
        </div>
        <div class="w4-table-wrap">
            <table class="w4-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Timestamp</th>
                        <th>Old Value</th>
                        <th>New Value</th>
                        <th>Change</th>
                    </tr>
                </thead>
                <tbody id="w4-previewBody"></tbody>
            </table>
        </div>
    </div>
</div>

<style>

    font-size: 15px;

    display: flex;
    gap: 12px;
    align-items: flex-end;
