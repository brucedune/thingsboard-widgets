<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
/* ── W13 Mobile Installer ── */
.w13-wrap {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    color: #333;
    background: #f5f7fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
}

/* ── PIN Screen ── */
.w13-pin-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, #305680 0%, #1a3550 100%);
}
.w13-pin-logo {
    font-size: 48px;
    margin-bottom: 8px;
}
.w13-pin-title {
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
}
.w13-pin-subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-bottom: 24px;
}
.w13-pin-dots {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
}
.w13-pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.5);
    background: transparent;
    transition: background 0.15s, border-color 0.15s;
}
.w13-pin-dot.filled {
    background: #fff;
    border-color: #fff;
}
.w13-pin-dot.error {
    background: #e74c3c;
    border-color: #e74c3c;
}
.w13-pin-pad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
    margin-bottom: 16px;
}
.w13-pin-key {
    width: 72px;
    height: 56px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.12);
    color: #fff;
    font-size: 24px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.15s;
}
.w13-pin-key:active {
    background: rgba(255,255,255,0.3);
}
.w13-pin-key.empty {
    visibility: hidden;
}
.w13-pin-key.backspace {
    font-size: 18px;
}
.w13-pin-error {
    color: #ff6b6b;
    font-size: 13px;
    min-height: 20px;
    margin-top: 4px;
}

/* ── Main App ── */
.w13-app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
}
.w13-header {
    background: #305680;
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
}
.w13-header-icon { font-size: 22px; }
.w13-header-title { font-size: 16px; font-weight: 600; flex: 1; }
.w13-header-user {
    font-size: 11px;
    background: rgba(255,255,255,0.15);
    padding: 3px 8px;
    border-radius: 10px;
}
.w13-header-logout {
    background: none;
    border: none;
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
}

/* ── Status bar ── */
.w13-status {
    padding: 10px 16px;
    font-size: 13px;
    display: none;
    align-items: center;
    gap: 6px;
}
.w13-status.info  { background: #e3f2fd; color: #1565c0; display: flex; }
.w13-status.error { background: #fce4ec; color: #c62828; display: flex; }
.w13-status.success { background: #e8f5e9; color: #2e7d32; display: flex; }

/* ── Device Scan / Search ── */
.w13-scan-section {
    padding: 16px;
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
}
.w13-scan-label {
    font-size: 12px;
    color: #666;
    margin-bottom: 6px;
    font-weight: 500;
}
.w13-scan-row {
    display: flex;
    gap: 8px;
}
.w13-scan-input {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: #fafafa;
}
.w13-scan-input:focus { border-color: #305680; background: #fff; }
.w13-scan-btn {
    padding: 10px 16px;
    background: #305680;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
}
.w13-scan-btn:active { background: #244060; }
.w13-scan-btn:disabled { background: #94a3b8; }

/* ── Device Info Card ── */
.w13-device-card {
    display: none;
    margin: 12px 16px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
}
.w13-device-name {
    padding: 12px 16px;
    background: #305680;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.w13-device-name .w13-device-label {
    font-size: 11px;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 400;
    margin-left: auto;
}
.w13-device-meta {
    padding: 12px 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    border-bottom: 1px solid #f0f0f0;
}
.w13-meta-item {
    display: flex;
    flex-direction: column;
}
.w13-meta-label {
    font-size: 10px;
    text-transform: uppercase;
    color: #888;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
}
.w13-meta-value {
    font-size: 14px;
    color: #333;
    font-weight: 500;
}

/* ── Last Reading ── */
.w13-reading-bar {
    padding: 10px 16px;
    background: #f8f9fa;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #f0f0f0;
}
.w13-reading-label { font-size: 11px; color: #666; }
.w13-reading-value { font-size: 16px; font-weight: 600; color: #305680; }
.w13-reading-date  { font-size: 11px; color: #999; margin-left: auto; }

/* ── Form ── */
.w13-form {
    padding: 12px 16px 20px;
}
.w13-form-title {
    font-size: 13px;
    font-weight: 600;
    color: #305680;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid #305680;
}
.w13-field {
    margin-bottom: 12px;
}
.w13-field label {
    display: block;
    font-size: 12px;
    color: #555;
    margin-bottom: 4px;
    font-weight: 500;
}
.w13-field input,
.w13-field select,
.w13-field textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    background: #fafafa;
    box-sizing: border-box;
}
.w13-field input:focus,
.w13-field select:focus,
.w13-field textarea:focus {
    border-color: #305680;
    background: #fff;
}
.w13-field textarea { resize: vertical; min-height: 60px; }

.w13-field-row {
    display: flex;
    gap: 10px;
}
.w13-field-row .w13-field { flex: 1; }

/* ── Photo capture ── */
.w13-photo-section {
    margin-bottom: 14px;
}
.w13-photo-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    border: 2px dashed #bbb;
    border-radius: 8px;
    background: #fafafa;
    color: #666;
    font-size: 14px;
    cursor: pointer;
}
.w13-photo-btn:active { background: #f0f0f0; }
.w13-photo-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
}
.w13-photo-thumb {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    object-fit: cover;
    border: 1px solid #ddd;
}

/* ── Submit ── */
.w13-submit-row {
    padding: 12px 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.w13-submit-btn {
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.w13-submit-btn:active { transform: scale(0.98); }
.w13-submit-btn:disabled { opacity: 0.5; }
.w13-btn-save {
    background: #305680;
    color: #fff;
}
.w13-btn-complete {
    background: #2e7d32;
    color: #fff;
}
.w13-btn-replace {
    background: #e65100;
    color: #fff;
}

/* ── History ── */
.w13-history {
    padding: 0 16px 20px;
}
.w13-history-title {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
}
.w13-history-item {
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 13px;
    color: #555;
}
</style>

<div class="w13-wrap" id="w13-wrap">

    <!-- ── PIN Entry ── -->
    <div class="w13-pin-screen" id="w13-pinScreen">
        <div class="w13-pin-logo">💧</div>
        <div class="w13-pin-title">Meter Installer</div>
        <div class="w13-pin-subtitle">Enter your PIN to continue</div>
        <div class="w13-pin-dots" id="w13-pinDots">
            <div class="w13-pin-dot" data-idx="0"></div>
            <div class="w13-pin-dot" data-idx="1"></div>
            <div class="w13-pin-dot" data-idx="2"></div>
            <div class="w13-pin-dot" data-idx="3"></div>
        </div>
        <div class="w13-pin-pad" id="w13-pinPad">
            <div class="w13-pin-key" data-key="1">1</div>
            <div class="w13-pin-key" data-key="2">2</div>
            <div class="w13-pin-key" data-key="3">3</div>
            <div class="w13-pin-key" data-key="4">4</div>
            <div class="w13-pin-key" data-key="5">5</div>
            <div class="w13-pin-key" data-key="6">6</div>
            <div class="w13-pin-key" data-key="7">7</div>
            <div class="w13-pin-key" data-key="8">8</div>
            <div class="w13-pin-key" data-key="9">9</div>
            <div class="w13-pin-key empty"></div>
            <div class="w13-pin-key" data-key="0">0</div>
            <div class="w13-pin-key backspace" data-key="del">⌫</div>
        </div>
        <div class="w13-pin-error" id="w13-pinError"></div>
    </div>

    <!-- ── Main App ── -->
    <div class="w13-app" id="w13-app">
        <div class="w13-header">
            <span class="w13-header-icon">💧</span>
            <span class="w13-header-title">Meter Installer</span>
            <span class="w13-header-user" id="w13-userName"></span>
            <button class="w13-header-logout" id="w13-logoutBtn">Logout</button>
        </div>

        <div class="w13-status" id="w13-statusMsg"></div>

        <!-- Search / Scan (hidden when device comes from QR state) -->
        <div class="w13-scan-section" id="w13-scanSection">
            <div class="w13-scan-label">Device Name or ID</div>
            <div class="w13-scan-row">
                <input type="text" class="w13-scan-input" id="w13-deviceInput" placeholder="Scan QR or enter device name" autocomplete="off">
                <button class="w13-scan-btn" id="w13-lookupBtn">Lookup</button>
            </div>
        </div>

        <!-- Device Card -->
        <div class="w13-device-card" id="w13-deviceCard">
            <div class="w13-device-name">
                <span id="w13-devName">--</span>
                <span class="w13-device-label" id="w13-devLabel"></span>
            </div>
            <div class="w13-device-meta">
                <div class="w13-meta-item">
                    <span class="w13-meta-label">Owner</span>
                    <span class="w13-meta-value" id="w13-devOwner">--</span>
                </div>
                <div class="w13-meta-item">
                    <span class="w13-meta-label">Model</span>
                    <span class="w13-meta-value" id="w13-devModel">--</span>
                </div>
                <div class="w13-meta-item">
                    <span class="w13-meta-label">Property</span>
                    <span class="w13-meta-value" id="w13-devProperty">--</span>
                </div>
                <div class="w13-meta-item">
                    <span class="w13-meta-label">Installed</span>
                    <span class="w13-meta-value" id="w13-devInstalled">--</span>
                </div>
            </div>
            <div class="w13-reading-bar">
                <span class="w13-reading-label">Last Reading:</span>
                <span class="w13-reading-value" id="w13-devReading">--</span>
                <span class="w13-reading-date" id="w13-devReadingDate"></span>
            </div>

            <!-- Install Form -->
            <div class="w13-form">
                <div class="w13-form-title">Installation Details</div>

                <div class="w13-field-row">
                    <div class="w13-field">
                        <label>Apartment</label>
                        <input type="text" id="w13-fApartment" autocomplete="off">
                    </div>
                    <div class="w13-field">
                        <label>Location</label>
                        <input type="text" id="w13-fLocation" autocomplete="off">
                    </div>
                </div>

                <div class="w13-field-row">
                    <div class="w13-field">
                        <label>Pipe Size</label>
                        <select id="w13-fPipeSize">
                            <option value="">--</option>
                            <option value="1/2">1/2"</option>
                            <option value="3/4">3/4"</option>
                            <option value="1">1"</option>
                            <option value="1.5">1.5"</option>
                            <option value="2">2"</option>
                        </select>
                    </div>
                    <div class="w13-field">
                        <label>Pipe Type</label>
                        <select id="w13-fPipeType">
                            <option value="">--</option>
                            <option value="Copper">Copper</option>
                            <option value="PVC">PVC</option>
                            <option value="PEX">PEX</option>
                            <option value="CPVC">CPVC</option>
                            <option value="Galvanized">Galvanized</option>
                        </select>
                    </div>
                </div>

                <div class="w13-field">
                    <label>Install Date</label>
                    <input type="date" id="w13-fInstallDate">
                </div>

                <div class="w13-field">
                    <label>Install Notes</label>
                    <textarea id="w13-fNotes" rows="2" placeholder="Optional notes"></textarea>
                </div>

                <!-- Photo capture -->
                <div class="w13-photo-section">
                    <label style="display:block;font-size:12px;color:#555;margin-bottom:4px;font-weight:500;">Install Photo</label>
                    <label class="w13-photo-btn" id="w13-photoBtn">
                        📷 Take Photo
                        <input type="file" accept="image/*" capture="environment" id="w13-photoInput" style="display:none;">
                    </label>
                    <div class="w13-photo-preview" id="w13-photoPreview"></div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="w13-submit-row">
                <button class="w13-submit-btn w13-btn-save" id="w13-saveBtn" disabled>
                    💾 Save Attributes
                </button>
                <button class="w13-submit-btn w13-btn-complete" id="w13-completeBtn" disabled>
                    ✅ Mark Installed
                </button>
                <button class="w13-submit-btn w13-btn-replace" id="w13-replaceBtn" disabled>
                    🔄 Flag for Replace
                </button>
            </div>
        </div>
    </div>
</div>
